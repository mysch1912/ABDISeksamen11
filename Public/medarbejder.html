<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medarbejderdetalje</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="side-layout">
    <aside class="sidebar">
      <div class="sidebar-top"></div>

      <div class="sidebar-menu">
        <div class="ikon">⌂</div>
        <div class="ikon">▦</div>
        <div class="ikon aktiv">▭</div>
        <div class="ikon">◔</div>
        <div class="ikon">✚</div>
      </div>

      <div class="sidebar-bottom">
        <div class="ikon">⚙</div>
        <div class="ikon">⇥</div>
      </div>
    </aside>

    <section class="indhold">
      <div class="dashboard-top medarbejder-top">
        <div>
          <a href="/" class="tilbage-link">← Tilbage til dashboard</a>
          <h1 id="side-overskrift">Medarbejderprofil og kapacitetsoversigt</h1>
        </div>
        <img src="/images/mette.png" alt="Mette" class="mette-avatar" />
      </div>

      <div class="kort-grid">
        <div class="kort">
          <h2>Profilkort</h2>
          <div id="profil-indhold"></div>
        </div>

        <div class="kort">
          <h2>Kapacitet</h2>
          <div id="kapacitet-indhold"></div>
        </div>

        <div class="kort">
          <h2>Kompetencer</h2>
          <div id="kompetencer-indhold" class="chips"></div>
        </div>

        <div class="kort">
          <h2>Nuværende opgaver</h2>
          <div id="opgaver-indhold"></div>
        </div>

        <div class="kort">
          <h2>Mulige opgaver</h2>
          <div id="mulige-opgaver-indhold"></div>
          <p id="feedback-besked" class="feedback"></p>
        </div>

        <div class="kort">
          <h2>Ugebelastning</h2>
          <div id="ugebelastning-indhold"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="/medarbejder.js"></script>
</body>
</html>
